<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - E-Mart Management System</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .step-panel {
      display: none;
    }
    .step-panel.active {
      display: block;
      animation: fadeIn 0.4s ease-out forwards;
    }
    .step-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.1);
      color: #94A3B8;
      font-size: 0.8rem;
      font-weight: bold;
      margin-bottom: 16px;
    }
    .step-badge.active {
      background-color: var(--accent-color);
      color: #0F172A;
    }
  </style>
</head>
<body class="auth-body">

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <i class="fas fa-store"></i>
        <span>E-Mart</span>
      </div>

      <!-- Step 1: Send Email -->
      <div class="step-panel active" id="step1">
        <div class="auth-header">
          <div class="step-badge active">1</div>
          <h2>Reset Password</h2>
          <p>Enter your email to receive a simulated reset code</p>
        </div>
        <form id="emailForm">
          <div class="form-group">
            <label class="form-label" for="reset_email">Email Address</label>
            <input type="email" id="reset_email" class="form-control" placeholder="admin@emart.com" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; border-radius: var(--radius-sm); font-weight: 600;">
            Send OTP Code
          </button>
        </form>
      </div>

      <!-- Step 2: Verify OTP -->
      <div class="step-panel" id="step2">
        <div class="auth-header">
          <div class="step-badge active">2</div>
          <h2>Enter Verification Code</h2>
          <p>Please enter the 4-digit code sent to your email</p>
          <div id="simulatedCodeAlert" style="background: rgba(6, 182, 212, 0.1); border: 1px solid var(--accent-color); border-radius: 6px; padding: 10px; color: var(--accent-color); font-size: 0.85rem; font-weight: 600; margin-top: 15px;">
            Simulated OTP Code: <span id="otpCodeSpan">0000</span>
          </div>
        </div>
        <form id="otpForm">
          <div class="form-group">
            <label class="form-label" for="reset_otp">4-Digit Code</label>
            <input type="text" id="reset_otp" class="form-control" placeholder="1234" maxlength="4" required style="letter-spacing: 0.5em; text-align: center; font-size: 1.25rem;">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; border-radius: var(--radius-sm); font-weight: 600;">
            Verify Code
          </button>
        </form>
      </div>

      <!-- Step 3: Enter New Password -->
      <div class="step-panel" id="step3">
        <div class="auth-header">
          <div class="step-badge active">3</div>
          <h2>Set New Password</h2>
          <p>Enter your secure new login credentials</p>
        </div>
        <form id="newPasswordForm">
          <div class="form-group">
            <label class="form-label" for="new_password">New Password</label>
            <input type="password" id="new_password" class="form-control" placeholder="••••••••" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="confirm_new_password">Confirm New Password</label>
            <input type="password" id="confirm_new_password" class="form-control" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; border-radius: var(--radius-sm); font-weight: 600;">
            Update Password
          </button>
        </form>
      </div>

      <div class="auth-footer">
        Back to <a href="/pages/login.html">Sign In</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js" defer></script>
  <script src="/js/navigation.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const emailForm = document.getElementById('emailForm');
      const otpForm = document.getElementById('otpForm');
      const newPasswordForm = document.getElementById('newPasswordForm');

      const step1 = document.getElementById('step1');
      const step2 = document.getElementById('step2');
      const step3 = document.getElementById('step3');

      const resetEmailInput = document.getElementById('reset_email');
      const resetOtpInput = document.getElementById('reset_otp');
      const newPasswordInput = document.getElementById('new_password');
      const confirmNewPasswordInput = document.getElementById('confirm_new_password');

      const otpCodeSpan = document.getElementById('otpCodeSpan');

      let savedEmail = '';
      let simulatedOtp = '';

      // Step 1: Submit Email
      emailForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = resetEmailInput.value.trim();
        
        if (!email) {
          showToast('Please enter an email', 'warning');
          return;
        }

        try {
          // Verify email with backend simulation
          const response = await API.post('/api/auth/forgot-password', { email });
          savedEmail = email;
          simulatedOtp = response.otp; // Simulated OTP returned from backend

          otpCodeSpan.innerText = simulatedOtp;
          
          showToast('OTP code sent successfully (simulated)!', 'success');
          
          // Switch to Step 2
          step1.classList.remove('active');
          step2.classList.add('active');
        } catch (error) {
          console.error('Email verify error:', error);
        }
      });

      // Step 2: Verify OTP
      otpForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const code = resetOtpInput.value.trim();

        if (code !== simulatedOtp) {
          showToast('Invalid verification code. Please check the code provided.', 'danger');
          return;
        }

        showToast('Verification successful!', 'success');
        
        // Switch to Step 3
        step2.classList.remove('active');
        step3.classList.add('active');
      });

      // Step 3: Update Password
      newPasswordForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = newPasswordInput.value;
        const confirmPassword = confirmNewPasswordInput.value;

        if (password !== confirmPassword) {
          showToast('Passwords do not match', 'warning');
          return;
        }

        if (password.length < 6) {
          showToast('Password must be at least 6 characters long', 'warning');
          return;
        }

        try {
          await API.post('/api/auth/reset-password', {
            email: savedEmail,
            otp: simulatedOtp,
            password: password
          });

          showToast('Password updated successfully! Redirecting to login...', 'success');
          
          setTimeout(() => {
            window.location.href = '/pages/login.html';
          }, 1500);
        } catch (error) {
          console.error('Password reset submit error:', error);
        }
      });
    });
  </script>
</body>
</html>
