<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - E-Mart Management System</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <i class="fas fa-store"></i>
        <span>E-Mart</span>
      </div>
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Access your E-Mart portal dashboard</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="login_email">Email Address</label>
          <input type="email" id="login_email" class="form-control" placeholder="admin@emart.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="login_password">Password</label>
          <div class="password-input-wrapper">
            <input type="password" id="login_password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="password-toggle-btn" id="passwordToggle" aria-label="Toggle Password Visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-size: 0.85rem;">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: #CBD5E1;">
            <input type="checkbox" id="rememberMe" style="cursor: pointer;"> Remember me
          </label>
          <a href="/pages/forgot-password.html" style="color: var(--accent-color); font-weight: 500;">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; border-radius: var(--radius-sm); font-weight: 600;">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/pages/signup.html">Create one</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/navigation.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginForm = document.getElementById('loginForm');
      const emailInput = document.getElementById('login_email');
      const passwordInput = document.getElementById('login_password');
      const rememberCheckbox = document.getElementById('rememberMe');
      const passwordToggle = document.getElementById('passwordToggle');

      // Populate remembered email
      const rememberedEmail = localStorage.getItem('remembered_email');
      if (rememberedEmail) {
        emailInput.value = rememberedEmail;
        rememberCheckbox.checked = true;
      }

      // Hide/Show password functionality
      passwordToggle.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        passwordToggle.querySelector('i').className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
      });

      // Submit Form
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const remember = rememberCheckbox.checked;

        if (!email || !password) {
          showToast('Please fill in all fields', 'warning');
          return;
        }

        try {
          const result = await API.post('/api/auth/login', { email, password });
          
          if (remember) {
            localStorage.setItem('remembered_email', email);
          } else {
            localStorage.removeItem('remembered_email');
          }

          showToast('Login successful! Redirecting...', 'success');
          
          // Redirect based on role
          setTimeout(() => {
            window.location.href = '/dashboard/index.html';
          }, 1000);
        } catch (error) {
          // Toast is shown inside API.post wrapper in case of network or response error
          console.error('Login submit error:', error);
        }
      });
    });
  </script>
</body>
</html>
