<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - E-Mart Management System</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <i class="fas fa-store"></i>
        <span>E-Mart</span>
      </div>
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Choose how you want to enter the E-Mart dashboard.</p>
      </div>

      <form id="loginForm">
        <div class="login-choice-grid" aria-label="Login role">
          <button type="button" class="login-choice-card active" data-role="admin" data-email="admin@emart.com">
            <span class="login-choice-icon"><i class="fas fa-user-shield"></i></span>
            <span>
              <strong>Admin</strong>
              <small>Full control for staff, users, settings, reports, and inventory.</small>
            </span>
          </button>
          <button type="button" class="login-choice-card" data-role="shopkeeper" data-email="shopkeeper@emart.com">
            <span class="login-choice-icon"><i class="fas fa-cash-register"></i></span>
            <span>
              <strong>Shopkeeper</strong>
              <small>Fast access for checkout, products, customers, and sales reports.</small>
            </span>
          </button>
        </div>

        <div class="selected-role-panel">
          <div>
            <span>Selected role</span>
            <strong id="selectedRoleLabel">Admin</strong>
          </div>
          <i class="fas fa-circle-check"></i>
        </div>

        <div class="form-group">
          <label class="form-label" for="login_email">Email Address</label>
          <input type="email" id="login_email" class="form-control" placeholder="admin@emart.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="login_password">Password</label>
          <div class="password-input-wrapper">
            <input type="password" id="login_password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" class="password-toggle-btn" id="passwordToggle" aria-label="Toggle Password Visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div style="display: flex; justify-content: flex-end; align-items: center; margin-bottom: 24px; font-size: 0.85rem;">
          <a href="/pages/forgot-password.html" style="color: var(--accent-color); font-weight: 500;">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; border-radius: var(--radius-sm); font-weight: 600;">
          <i class="fas fa-right-to-bracket"></i> Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/pages/signup.html">Create one</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/navigation.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginForm = document.getElementById('loginForm');
      const roleButtons = document.querySelectorAll('.login-choice-card');
      const selectedRoleLabel = document.getElementById('selectedRoleLabel');
      const emailInput = document.getElementById('login_email');
      const passwordInput = document.getElementById('login_password');
      const passwordToggle = document.getElementById('passwordToggle');
      let selectedRoleKey = 'admin';
      let selectedRole = 'Admin';

      roleButtons.forEach((button) => {
        button.addEventListener('click', () => {
          roleButtons.forEach((item) => item.classList.remove('active'));
          button.classList.add('active');
          selectedRoleKey = button.dataset.role;
          selectedRole = selectedRoleKey === 'admin' ? 'Admin' : 'Shopkeeper';
          selectedRoleLabel.textContent = selectedRole;
          emailInput.placeholder = button.dataset.email;
          emailInput.focus();
        });
      });

      passwordToggle.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        passwordToggle.querySelector('i').className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
      });

      // Submit Form
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const submitButton = loginForm.querySelector('button[type="submit"]');

        if (!email || !password) {
          showToast('Please enter your email and password', 'warning');
          return;
        }

        submitButton.disabled = true;
        submitButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In';

        try {
          const result = await API.post('/api/auth/login', { email, password });

          if (result.user?.role !== selectedRoleKey) {
            await API.post('/api/auth/logout', {});
            showToast(`This account is not registered as ${selectedRole}. Please choose the correct role.`, 'warning');
            submitButton.disabled = false;
            submitButton.innerHTML = '<i class="fas fa-right-to-bracket"></i> Sign In';
            return;
          }

          showToast(`${selectedRole} login successful! Redirecting...`, 'success');
          
          setTimeout(() => {
            window.location.href = '/dashboard/index.html';
          }, 1000);
        } catch (error) {
          console.error('Login submit error:', error);
          submitButton.disabled = false;
          submitButton.innerHTML = '<i class="fas fa-right-to-bracket"></i> Sign In';
        }
      });
    });
  </script>
</body>
</html>
