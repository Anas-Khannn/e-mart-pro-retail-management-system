<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - E-Mart Management System</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">

  <div class="auth-container">
    <div class="auth-card" style="padding: 30px;">
      <div class="auth-logo" style="margin-bottom: 20px;">
        <i class="fas fa-store"></i>
        <span>E-Mart</span>
      </div>
      <div class="auth-header" style="margin-bottom: 20px;">
        <h2>Create Account</h2>
        <p>Choose the account role you want to use after login.</p>
      </div>

      <form id="signupForm">
        <div class="login-role-switch" role="group" aria-label="Account role">
          <button type="button" data-role="admin">
            <i class="fas fa-user-shield"></i>
            Admin
          </button>
          <button type="button" class="active" data-role="shopkeeper">
            <i class="fas fa-cash-register"></i>
            Shopkeeper
          </button>
        </div>

        <div class="role-feature-panel">
          <div class="role-feature-title" id="roleFeatureTitle">Shopkeeper workspace includes</div>
          <div class="role-feature-grid" id="roleFeatureGrid"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="signup_profile_image">Profile Picture</label>
          <div class="profile-upload-row">
            <div class="profile-upload-preview" id="profilePreview">
              <i class="fas fa-user"></i>
            </div>
            <div class="profile-upload-control">
              <input type="file" id="signup_profile_image" class="form-control" accept="image/*">
              <span>Upload a clear photo to show on your account profile.</span>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="signup_name">Full Name</label>
          <input type="text" id="signup_name" class="form-control" placeholder="John Doe" required autocomplete="name">
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="signup_email">Email Address</label>
            <input type="email" id="signup_email" class="form-control" placeholder="john@emart.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label" for="signup_phone">Phone Number</label>
            <input type="tel" id="signup_phone" class="form-control" placeholder="+1234567890" required autocomplete="tel">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="signup_password">Password</label>
            <div class="password-input-wrapper">
              <input type="password" id="signup_password" class="form-control" placeholder="••••••••" required autocomplete="new-password">
            </div>
            <div class="strength-meter">
              <div class="strength-meter-bar" id="strengthBar"></div>
            </div>
            <span id="strengthText" style="font-size: 0.7rem; color: #94A3B8;">Password strength</span>
          </div>
          <div class="form-group">
            <label class="form-label" for="signup_confirm">Confirm Password</label>
            <input type="password" id="signup_confirm" class="form-control" placeholder="••••••••" required autocomplete="new-password">
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; border-radius: var(--radius-sm); font-weight: 600; margin-top: 10px;">
          Create Account
        </button>
      </form>

      <div class="auth-footer" style="margin-top: 20px;">
        Already have an account? <a href="/pages/login.html">Sign In</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/navigation.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const signupForm = document.getElementById('signupForm');
      const nameInput = document.getElementById('signup_name');
      const emailInput = document.getElementById('signup_email');
      const phoneInput = document.getElementById('signup_phone');
      const profileImageInput = document.getElementById('signup_profile_image');
      const profilePreview = document.getElementById('profilePreview');
      const passwordInput = document.getElementById('signup_password');
      const confirmInput = document.getElementById('signup_confirm');
      const strengthBar = document.getElementById('strengthBar');
      const strengthText = document.getElementById('strengthText');
      const roleButtons = document.querySelectorAll('.login-role-switch button');
      const roleFeatureTitle = document.getElementById('roleFeatureTitle');
      const roleFeatureGrid = document.getElementById('roleFeatureGrid');
      let selectedRole = 'shopkeeper';

      const roleProfiles = {
        admin: {
          title: 'Admin workspace includes',
          features: [
            ['fa-users-gear', 'Manage users and roles'],
            ['fa-sliders', 'Store settings and branding'],
            ['fa-chart-line', 'Full reports and analytics'],
            ['fa-cash-register', 'All shopkeeper tools included']
          ]
        },
        shopkeeper: {
          title: 'Shopkeeper workspace includes',
          features: [
            ['fa-cash-register', 'POS checkout and invoices'],
            ['fa-boxes-stacked', 'Inventory browsing'],
            ['fa-user-tag', 'Customer records'],
            ['fa-chart-simple', 'Sales reports access']
          ]
        }
      };

      function applyRole(role) {
        selectedRole = role;
        const profile = roleProfiles[role];
        roleButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.role === role));
        roleFeatureTitle.innerText = profile.title;
        roleFeatureGrid.innerHTML = profile.features.map(feature => `
          <div class="role-feature-item">
            <i class="fas ${feature[0]}"></i>
            <span>${feature[1]}</span>
          </div>
        `).join('');
      }

      roleButtons.forEach(btn => {
        btn.addEventListener('click', () => applyRole(btn.dataset.role));
      });
      applyRole(selectedRole);

      profileImageInput.addEventListener('change', () => {
        const file = profileImageInput.files[0];
        if (!file) {
          profilePreview.innerHTML = '<i class="fas fa-user"></i>';
          return;
        }

        if (!file.type.startsWith('image/')) {
          showToast('Please choose a valid image file.', 'warning');
          profileImageInput.value = '';
          profilePreview.innerHTML = '<i class="fas fa-user"></i>';
          return;
        }

        const reader = new FileReader();
        reader.onload = () => {
          profilePreview.innerHTML = `<img src="${reader.result}" alt="Profile preview">`;
        };
        reader.readAsDataURL(file);
      });

      // Live Password Strength Check
      passwordInput.addEventListener('input', () => {
        const password = passwordInput.value;
        let score = 0;
        
        if (password.length >= 8) score++;
        if (/[A-Z]/.test(password) && /[a-z]/.test(password)) score++;
        if (/[0-9]/.test(password)) score++;
        if (/[^A-Za-z0-9]/.test(password)) score++;

        let color = '#EF4444'; // Red (weak)
        let label = 'Weak (Needs upper, lower, numbers, special characters)';
        let width = '25%';

        if (score === 2) {
          color = '#F59E0B'; // Orange
          label = 'Fair (Better)';
          width = '50%';
        } else if (score === 3) {
          color = '#3B82F6'; // Blue
          label = 'Good';
          width = '75%';
        } else if (score === 4) {
          color = '#10B981'; // Green
          label = 'Strong';
          width = '100%';
        }

        if (password.length === 0) {
          width = '0%';
          label = 'Password strength';
        }

        strengthBar.style.width = width;
        strengthBar.style.backgroundColor = color;
        strengthText.innerText = label;
        strengthText.style.color = password.length > 0 ? color : '#94A3B8';
      });

      // Submit Sign Up Form
      signupForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const full_name = nameInput.value.trim();
        const email = emailInput.value.trim();
        const phone = phoneInput.value.trim();
        const password = passwordInput.value;
        const confirmPassword = confirmInput.value;

        // Validations
        if (password !== confirmPassword) {
          showToast('Passwords do not match', 'warning');
          return;
        }

        if (password.length < 6) {
          showToast('Password must be at least 6 characters long', 'warning');
          return;
        }

        try {
          const formData = new FormData();
          formData.append('full_name', full_name);
          formData.append('email', email);
          formData.append('phone', phone);
          formData.append('password', password);
          formData.append('role', selectedRole);
          if (profileImageInput.files[0]) {
            formData.append('profile_image', profileImageInput.files[0]);
          }

          await API.upload('/api/auth/signup', formData);

          showToast('Account created successfully! Redirecting...', 'success');
          
          setTimeout(() => {
            window.location.href = '/pages/login.html';
          }, 1500);
        } catch (error) {
          // Toast is handled in API client on failure response
          console.error('Signup error:', error);
        }
      });
    });
  </script>
</body>
</html>
