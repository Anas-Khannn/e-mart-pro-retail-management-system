<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory - E-Mart Management System</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="app-container">
    <div id="sidebar-placeholder"></div>

    <div class="main-content">
      <header id="header-placeholder" class="top-header"></header>

      <main class="page-container fade-in">
        
        <!-- Controls & Filters Card -->
        <div class="table-card">
          <div class="table-header">
            <div class="table-title">
              <h3>Product Catalog</h3>
            </div>
            <button class="btn btn-primary" id="openAddModalBtn">
              <i class="fas fa-plus"></i> Add Product
            </button>
          </div>

          <!-- Filters Row -->
          <div style="padding: 16px 24px; background-color: var(--bg-color); border-bottom: 1px solid var(--border-color); display: flex; flex-wrap: wrap; gap: 16px; align-items: center; justify-content: space-between;">
            <div style="display: flex; flex-wrap: wrap; gap: 12px; align-items: center;">
              
              <!-- Search -->
              <div class="search-input-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchBar" class="search-input" placeholder="Search by name or SKU...">
              </div>

              <!-- Category Filter -->
              <select id="categoryFilter" class="select-filter">
                <option value="">All Categories</option>
              </select>

              <!-- Supplier Filter -->
              <select id="supplierFilter" class="select-filter">
                <option value="">All Suppliers</option>
              </select>
            </div>

            <div style="display: flex; gap: 12px; align-items: center;">
              <!-- Sort By -->
              <select id="sortBy" class="select-filter">
                <option value="created_at">Sort By: Date Added</option>
                <option value="name">Sort By: Name</option>
                <option value="sku">Sort By: SKU</option>
                <option value="selling_price">Sort By: Price</option>
                <option value="quantity">Sort By: Quantity</option>
              </select>

              <!-- Sort Order -->
              <select id="sortOrder" class="select-filter">
                <option value="desc">Descending</option>
                <option value="asc">Ascending</option>
              </select>
            </div>
          </div>

          <!-- Responsive Table -->
          <div class="table-responsive">
            <table class="custom-table" id="productsTable">
              <thead>
                <tr>
                  <th>Thumbnail</th>
                  <th>Product Details</th>
                  <th>SKU Code</th>
                  <th>Category</th>
                  <th>Buy Price</th>
                  <th>Sell Price</th>
                  <th>Stock Status</th>
                  <th>Supplier</th>
                  <th style="text-align: center;">Actions</th>
                </tr>
              </thead>
              <tbody id="productsTableBody">
                <tr>
                  <td colspan="9" style="text-align: center; color: var(--text-muted); padding: 40px;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 8px;"></i><br>
                    Fetching catalog records...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Pagination Bar -->
          <div class="pagination">
            <div class="pagination-info" id="paginationInfo">
              Showing 0 to 0 of 0 products
            </div>
            <div class="pagination-buttons">
              <button class="btn btn-secondary btn-sm" id="prevPageBtn" disabled>Previous</button>
              <button class="btn btn-secondary btn-sm" id="nextPageBtn" disabled>Next</button>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- Add/Edit Product Modal Backdrop -->
  <div class="modal-backdrop" id="productModal">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title">
          <h3 id="modalTitle">Add New Product</h3>
        </div>
        <button class="modal-close" id="closeModalBtn">&times;</button>
      </div>
      
      <form id="productForm">
        <input type="hidden" id="product_id">
        <div class="modal-body">
          
          <div class="form-group">
            <label class="form-label" for="prod_name">Product Name *</label>
            <input type="text" id="prod_name" class="form-control" placeholder="e.g. Fresh Organic Tomatoes" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="prod_sku">SKU Code *</label>
              <input type="text" id="prod_sku" class="form-control" placeholder="e.g. GR-TOM-021" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="prod_category">Category</label>
              <select id="prod_category" class="form-control">
                <option value="">Select Category</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="prod_purchase">Purchase Price ($) *</label>
              <input type="number" id="prod_purchase" class="form-control" step="0.01" min="0" placeholder="0.00" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="prod_selling">Selling Price ($) *</label>
              <input type="number" id="prod_selling" class="form-control" step="0.01" min="0" placeholder="0.00" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="prod_qty">Initial Quantity *</label>
              <input type="number" id="prod_qty" class="form-control" min="0" placeholder="0" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="prod_supplier">Supplier</label>
              <select id="prod_supplier" class="form-control">
                <option value="">Select Supplier</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Product Image</label>
            <div class="file-input-wrapper">
              <div class="file-input-text" id="fileInputText">
                <i class="fas fa-cloud-upload-alt"></i><br>
                <span>Click or Drag photo file here to upload</span>
              </div>
              <input type="file" id="prod_image" accept="image/*">
            </div>
          </div>

        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="cancelModalBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/navigation.js"></script>
  <script>
    // State Tracking
    let currentPage = 1;
    const itemsPerPage = 8;
    let totalProducts = 0;

    // DOM Elements
    const searchBar = document.getElementById('searchBar');
    const categoryFilter = document.getElementById('categoryFilter');
    const supplierFilter = document.getElementById('supplierFilter');
    const sortBy = document.getElementById('sortBy');
    const sortOrder = document.getElementById('sortOrder');
    const productsTableBody = document.getElementById('productsTableBody');
    const paginationInfo = document.getElementById('paginationInfo');
    const prevPageBtn = document.getElementById('prevPageBtn');
    const nextPageBtn = document.getElementById('nextPageBtn');

    const productModal = document.getElementById('productModal');
    const productForm = document.getElementById('productForm');
    const openAddModalBtn = document.getElementById('openAddModalBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const cancelModalBtn = document.getElementById('cancelModalBtn');
    const modalTitle = document.getElementById('modalTitle');

    const prodIdInput = document.getElementById('product_id');
    const prodNameInput = document.getElementById('prod_name');
    const prodSkuInput = document.getElementById('prod_sku');
    const prodCategorySelect = document.getElementById('prod_category');
    const prodPurchaseInput = document.getElementById('prod_purchase');
    const prodSellingInput = document.getElementById('prod_selling');
    const prodQtyInput = document.getElementById('prod_qty');
    const prodSupplierSelect = document.getElementById('prod_supplier');
    const prodImageFile = document.getElementById('prod_image');
    const fileInputText = document.getElementById('fileInputText');

    document.addEventListener('DOMContentLoaded', () => {
      // Load filters on start
      loadDropdowns();
      
      // Load catalog
      loadCatalog();

      // Filter/Search triggers
      searchBar.addEventListener('input', () => { currentPage = 1; loadCatalog(); });
      categoryFilter.addEventListener('change', () => { currentPage = 1; loadCatalog(); });
      supplierFilter.addEventListener('change', () => { currentPage = 1; loadCatalog(); });
      sortBy.addEventListener('change', () => loadCatalog());
      sortOrder.addEventListener('change', () => loadCatalog());

      // Pagination triggers
      prevPageBtn.addEventListener('click', () => { if (currentPage > 1) { currentPage--; loadCatalog(); } });
      nextPageBtn.addEventListener('click', () => { if (currentPage * itemsPerPage < totalProducts) { currentPage++; loadCatalog(); } });

      // Modal Triggers
      openAddModalBtn.addEventListener('click', () => openModal(false));
      closeModalBtn.addEventListener('click', closeModal);
      cancelModalBtn.addEventListener('click', closeModal);
      
      // Image upload text update
      prodImageFile.addEventListener('change', () => {
        if (prodImageFile.files.length > 0) {
          fileInputText.innerHTML = `<i class="fas fa-file-image"></i><br><span>${prodImageFile.files[0].name} (${Math.round(prodImageFile.files[0].size/1024)} KB)</span>`;
        } else {
          fileInputText.innerHTML = `<i class="fas fa-cloud-upload-alt"></i><br><span>Click or Drag photo file here to upload</span>`;
        }
      });

      // Submit Form (Add or Edit)
      productForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const id = prodIdInput.value;
        const formData = new FormData();
        formData.append('name', prodNameInput.value.trim());
        formData.append('sku', prodSkuInput.value.trim());
        formData.append('category_id', prodCategorySelect.value);
        formData.append('purchase_price', prodPurchaseInput.value);
        formData.append('selling_price', prodSellingInput.value);
        formData.append('quantity', prodQtyInput.value);
        formData.append('supplier_id', prodSupplierSelect.value);
        
        if (prodImageFile.files.length > 0) {
          formData.append('product_image', prodImageFile.files[0]);
        }

        try {
          if (id) {
            // Edit mode
            await API.upload(`/api/products/${id}`, formData);
            showToast('Product updated successfully!', 'success');
          } else {
            // Add mode
            await API.upload('/api/products', formData);
            showToast('Product added successfully!', 'success');
          }
          closeModal();
          loadCatalog();
        } catch (err) {
          console.error('Submit product failure:', err);
        }
      });
    });

    // Load Categories & Suppliers dropdowns
    async function loadDropdowns() {
      try {
        const categories = await API.get('/api/categories');
        const suppliers = await API.get('/api/suppliers');

        // Populate catalog filter
        categoryFilter.innerHTML = `<option value="">All Categories</option>` + categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        supplierFilter.innerHTML = `<option value="">All Suppliers</option>` + suppliers.map(s => `<option value="${s.id}">${s.name}</option>`).join('');

        // Populate modal select elements
        prodCategorySelect.innerHTML = `<option value="">Select Category</option>` + categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        prodSupplierSelect.innerHTML = `<option value="">Select Supplier</option>` + suppliers.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
      } catch (err) {
        console.error('Dropdowns fetch error:', err);
      }
    }

    // Main catalog loading
    async function loadCatalog() {
      const search = searchBar.value.trim();
      const cat = categoryFilter.value;
      const sup = supplierFilter.value;
      const sort = sortBy.value;
      const order = sortOrder.value;

      let url = `/api/products?page=${currentPage}&limit=${itemsPerPage}&sort_by=${sort}&sort_order=${order}`;
      if (search) url += `&search=${encodeURIComponent(search)}`;
      if (cat) url += `&category_id=${cat}`;
      if (sup) url += `&supplier_id=${sup}`;

      try {
        const response = await API.get(url);
        totalProducts = response.total;
        renderProducts(response.products);
        renderPagination();
      } catch (err) {
        productsTableBody.innerHTML = `<tr><td colspan="9" style="text-align: center; color: var(--danger-color); padding: 40px;">Failed to load products database.</td></tr>`;
      }
    }

    // Render Products Table rows
    function renderProducts(products) {
      if (products.length === 0) {
        productsTableBody.innerHTML = `<tr><td colspan="9" style="text-align: center; color: var(--text-muted); padding: 40px;">No product records found. Click 'Add Product' to start.</td></tr>`;
        return;
      }

      productsTableBody.innerHTML = products.map(prod => {
        const image = prod.image_url ? prod.image_url : '/images/placeholder-product.png';
        
        // Stock level status formatting
        let stockBadge = '';
        if (prod.quantity === 0) {
          stockBadge = `<span class="badge badge-danger">Out of Stock (0)</span>`;
        } else if (prod.quantity < 15) {
          stockBadge = `<span class="badge badge-warning">Low Stock (${prod.quantity})</span>`;
        } else {
          stockBadge = `<span class="badge badge-success">In Stock (${prod.quantity})</span>`;
        }

        return `
          <tr>
            <td style="width: 70px;">
              <div style="width: 50px; height: 50px; border-radius: var(--radius-sm); border: 1px solid var(--border-color); overflow: hidden; background-color: var(--bg-color); display:flex; align-items:center; justify-content:center;">
                <img src="${image}" alt="${prod.name}" style="width:100%; height:100%; object-fit:cover;" onerror="this.src='https://placehold.co/50'">
              </div>
            </td>
            <td>
              <div style="font-weight: 600;">${prod.name}</div>
            </td>
            <td><code style="font-size: 0.8rem; background: var(--bg-color); padding: 2px 6px; border-radius:4px; border:1px solid var(--border-color);">${prod.sku}</code></td>
            <td>${prod.category_name || '<span style="color:var(--text-muted)">Uncategorized</span>'}</td>
            <td>$${parseFloat(prod.purchase_price).toFixed(2)}</td>
            <td style="font-weight: 600; color: var(--primary-color);">$${parseFloat(prod.selling_price).toFixed(2)}</td>
            <td>${stockBadge}</td>
            <td>${prod.supplier_name || '<span style="color:var(--text-muted)">None</span>'}</td>
            <td style="text-align: center; white-space: nowrap;">
              <button class="btn btn-secondary btn-sm" onclick="editProduct(${prod.id})" style="padding: 6px; margin-right: 4px;" title="Edit Product"><i class="fas fa-edit"></i></button>
              <button class="btn btn-danger btn-sm" onclick="deleteProduct(${prod.id})" style="padding: 6px;" title="Delete Product"><i class="fas fa-trash-alt"></i></button>
            </td>
          </tr>
        `;
      }).join('');
    }

    // Render Pagination numbers
    function renderPagination() {
      const totalPages = Math.ceil(totalProducts / itemsPerPage);
      const start = totalProducts === 0 ? 0 : (currentPage - 1) * itemsPerPage + 1;
      const end = Math.min(currentPage * itemsPerPage, totalProducts);

      paginationInfo.innerText = `Showing ${start} to ${end} of ${totalProducts} products`;

      prevPageBtn.disabled = currentPage === 1;
      nextPageBtn.disabled = currentPage === totalPages || totalPages === 0;
    }

    // Modal Operations
    function openModal(isEdit = false) {
      productForm.reset();
      prodIdInput.value = '';
      fileInputText.innerHTML = `<i class="fas fa-cloud-upload-alt"></i><br><span>Click or Drag photo file here to upload</span>`;

      if (isEdit) {
        modalTitle.innerText = 'Edit Product Details';
      } else {
        modalTitle.innerText = 'Add New Product';
      }

      productModal.classList.add('show');
    }

    function closeModal() {
      productModal.classList.remove('show');
    }

    // Edit Product fetch
    window.editProduct = async (id) => {
      openModal(true);
      try {
        const response = await API.get(`/api/products?search=&page=1&limit=1000`);
        const prod = response.products.find(p => p.id === id);
        if (prod) {
          prodIdInput.value = prod.id;
          prodNameInput.value = prod.name;
          prodSkuInput.value = prod.sku;
          prodCategorySelect.value = prod.category_id || '';
          prodPurchaseInput.value = prod.purchase_price;
          prodSellingInput.value = prod.selling_price;
          prodQtyInput.value = prod.quantity;
          prodSupplierSelect.value = prod.supplier_id || '';
          
          if (prod.image_url) {
            fileInputText.innerHTML = `<i class="fas fa-file-image"></i><br><span>Has Photo Attached (Click to Change)</span>`;
          }
        }
      } catch (err) {
        console.error('Fetch edit details error:', err);
      }
    };

    // Delete Product
    window.deleteProduct = async (id) => {
      if (confirm('Are you sure you want to delete this product? This action is permanent.')) {
        try {
          await API.delete(`/api/products/${id}`);
          showToast('Product deleted successfully.', 'success');
          loadCatalog();
        } catch (err) {
          console.error('Delete product error:', err);
        }
      }
    };
  </script>
</body>
</html>
